name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install --quiet -e .

      - name: Generate the static demo report
        run: |
          mkdir -p site
          python - <<'PY'
          import html, json, sys
          from pathlib import Path
          sys.path.insert(0, "src")
          from prompt_registry.registry import Registry, default_registry_path
          from prompt_registry.evaluator import evaluate_registration

          reg = Registry(default_registry_path())
          prompts = []
          for name in reg.list_prompts():
              r = reg.get(name)
              entry = {"name": name, "active": r.active_version,
                       "latest": r.latest_version(),
                       "versions": sorted(r.versions.keys()),
                       "reports": {}}
              for v in entry["versions"]:
                  rep = evaluate_registration(r, v)
                  entry["reports"][v] = {"passed": rep.passed, "total": rep.total,
                                          "rate": rep.pass_rate,
                                          "description": r.versions[v].description}
              prompts.append(entry)

          def status_badge(rep, is_active):
              rate_pct = int(rep["rate"] * 100)
              cls = "high" if rep["rate"] == 1.0 else "mid" if rep["rate"] >= 0.8 else "low"
              active_marker = "<span class='active-badge'>ACTIVE</span>" if is_active else ""
              return f"<div class='version-row'>{active_marker}<span class='pass {cls}'>{rep['passed']}/{rep['total']} ({rate_pct}%)</span></div>"

          def card(p):
              versions_html = ""
              for v in p["versions"]:
                  rep = p["reports"][v]
                  is_active = v == p["active"]
                  versions_html += f"""
                    <div class="version-card">
                      <div class="version-head">
                        <code class="vname">{html.escape(v)}</code>
                        {status_badge(rep, is_active)}
                      </div>
                      <div class="version-desc">{html.escape(rep['description'])}</div>
                    </div>
                  """

              promote_hint = ""
              if p["active"] != p["latest"] and p["reports"][p["latest"]]["rate"] == 1.0:
                  promote_hint = f"<div class='hint'>-> Latest version ({p['latest']}) passes evals; safe to promote.</div>"

              return f"""
                <div class="card">
                  <div class="kicker">prompt</div>
                  <h2>{html.escape(p['name'])}</h2>
                  <div class="meta">
                    <span class="pill">active: <code>{html.escape(p['active'])}</code></span>
                    <span class="pill">latest: <code>{html.escape(p['latest'])}</code></span>
                  </div>
                  {versions_html}
                  {promote_hint}
                </div>
              """

          page = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Prompt registry kit - live demo</title>
            <style>
              :root {{
                --primary: #0e7490; --accent: #06b6d4;
                --bg: #ecfeff; --border: #a5f3fc;
                --ink: #083344; --muted: #475569;
                --high: #047857; --mid: #b45309; --low: #b91c1c;
              }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
                background: var(--bg); color: var(--ink); line-height: 1.5;
              }}
              .hero {{
                background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
                color: white; padding: 50px 24px 60px;
              }}
              .hero-inner {{ max-width: 960px; margin: 0 auto; }}
              .hero .kicker {{ font-size: 13px; letter-spacing: 2px; opacity: .75; text-transform: uppercase; }}
              .hero h1 {{ font-size: 38px; margin: 10px 0 14px; line-height: 1.1; }}
              .hero p {{ font-size: 17px; margin: 0; opacity: .92; max-width: 760px; }}
              .container {{ max-width: 960px; margin: -30px auto 60px; padding: 0 24px; }}
              .card {{
                background: white; border: 1px solid var(--border); border-radius: 12px;
                padding: 20px 26px; margin: 16px 0;
                box-shadow: 0 1px 3px rgba(14, 116, 144, .08);
              }}
              .card h2 {{ margin: 6px 0 12px; font-size: 22px; }}
              .kicker {{
                font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
                color: var(--accent); font-weight: 700;
              }}
              .meta {{ margin: 0 0 18px; }}
              .pill {{
                display: inline-block; background: #cffafe; color: var(--primary);
                padding: 3px 10px; border-radius: 12px; font-size: 12px;
                font-weight: 600; margin-right: 6px;
              }}
              .pill code {{ background: transparent; color: var(--primary); }}
              .version-card {{
                background: #f8fafc; border: 1px solid #e2e8f0;
                border-radius: 8px; padding: 12px 16px; margin: 8px 0;
              }}
              .version-head {{ display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }}
              code.vname {{
                background: #cffafe; padding: 3px 10px; border-radius: 5px;
                color: var(--primary); font-weight: 700; font-size: 14px;
              }}
              .active-badge {{
                background: var(--high); color: white;
                padding: 2px 8px; border-radius: 10px; font-size: 10px;
                letter-spacing: 1px; font-weight: 700;
              }}
              .pass {{
                padding: 2px 8px; border-radius: 5px; font-family: Consolas, monospace;
                font-size: 13px; font-weight: 600;
              }}
              .pass.high {{ background: #d1fae5; color: var(--high); }}
              .pass.mid {{ background: #fef3c7; color: var(--mid); }}
              .pass.low {{ background: #fee2e2; color: var(--low); }}
              .version-row {{ display: flex; align-items: center; gap: 10px; }}
              .version-desc {{ font-size: 13px; color: var(--muted); margin-left: 0; line-height: 1.4; }}
              .hint {{
                margin-top: 12px; padding: 10px 14px;
                background: #d1fae5; color: var(--high); border-radius: 6px;
                font-size: 13px; font-weight: 600;
              }}
              .footer {{
                margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
                color: var(--muted); font-size: 13px; text-align: center;
              }}
              .footer code {{ background: #cffafe; padding: 2px 6px; border-radius: 4px; }}
              a {{ color: var(--accent); }}
            </style>
          </head>
          <body>
            <div class="hero">
              <div class="hero-inner">
                <div class="kicker">Prompts · Versioned · Eval-Gated</div>
                <h1>Prompt registry kit - live demo</h1>
                <p>Three bundled prompts, each with two versions. Every version
                is eval-tested against its golden cases on every push. The
                ACTIVE badge marks the version currently serving traffic; the
                green hint marks versions that are safe to promote.</p>
              </div>
            </div>

            <div class="container">
              {''.join(card(p) for p in prompts)}

              <div class="footer">
                Regenerated on every push from the stub backend.
                Install: <code>pip install -e .</code> then <code>prompt-registry demo</code>.<br>
                Source: <a href="https://github.com/derekgallardo01/prompt-registry-kit">github.com/derekgallardo01/prompt-registry-kit</a>
              </div>
            </div>
          </body>
          </html>
          """
          with open("site/index.html", "w", encoding="utf-8") as fh:
              fh.write(page)
          print("wrote site/index.html")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
