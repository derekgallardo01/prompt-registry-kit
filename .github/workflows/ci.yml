name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Eval-gate all bundled prompts (active + latest versions)
        run: |
          for prompt in $(prompt-registry list | awk 'NR>2 {print $1}'); do
            echo "=== $prompt ==="
            prompt-registry eval "$prompt"
          done

      - name: Smoke check the CLI
        run: |
          prompt-registry list
          prompt-registry show customer_complaint_classifier
          prompt-registry demo
